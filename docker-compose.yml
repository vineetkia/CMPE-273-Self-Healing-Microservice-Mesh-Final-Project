services:
  # ============== Infra ==============
  etcd:
    restart: unless-stopped
    mem_limit: 128m
    image: quay.io/coreos/etcd:v3.5.13
    command:
      - /usr/local/bin/etcd
      - --name=etcd0
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    restart: unless-stopped
    mem_limit: 64m
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  jaeger:
    restart: unless-stopped
    mem_limit: 1g
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
      - "4317"           # OTLP gRPC (internal)

  otel-collector:
    restart: unless-stopped
    mem_limit: 256m
    image: otel/opentelemetry-collector-contrib:0.99.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    depends_on:
      - jaeger
    ports:
      - "4317:4317"
      - "4318:4318"

  prometheus:
    restart: unless-stopped
    mem_limit: 256m
    image: prom/prometheus:v2.51.2
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  # ============== App services ==============
  auth:
    restart: unless-stopped
    mem_limit: 128m
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        SERVICE_DIR: services/auth
        ENTRYPOINT_MODULE: main
    environment:
      SERVICE_NAME: auth
      PORT: "50051"
      METRICS_PORT: "9101"
      ETCD_HOST: etcd
      NATS_URL: nats://nats:4222
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      etcd:
        condition: service_healthy
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_started

  order:
    restart: unless-stopped
    mem_limit: 256m
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        SERVICE_DIR: services/order
        ENTRYPOINT_MODULE: main
    environment:
      SERVICE_NAME: order
      PORT: "50052"
      METRICS_PORT: "9102"
      ETCD_HOST: etcd
      NATS_URL: nats://nats:4222
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      etcd:
        condition: service_healthy
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_started

  inventory:
    restart: unless-stopped
    mem_limit: 128m
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        SERVICE_DIR: services/inventory
