  gateway:
    restart: unless-stopped
    mem_limit: 768m
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        SERVICE_DIR: services/gateway
        ENTRYPOINT_MODULE: main
    environment:
      SERVICE_NAME: gateway
      PORT: "8080"
      ETCD_HOST: etcd
      NATS_URL: nats://nats:4222
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:8080}"
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
      GOOGLE_OAUTH_CLIENT_SECRET: "${GOOGLE_OAUTH_CLIENT_SECRET:-}"
      GOOGLE_OAUTH_REDIRECT_URI: "${GOOGLE_OAUTH_REDIRECT_URI:-}"
      GOOGLE_OAUTH_STATE_SECRET: "${GOOGLE_OAUTH_STATE_SECRET:-}"
      GOOGLE_OAUTH_ALLOWED_DOMAIN: "${GOOGLE_OAUTH_ALLOWED_DOMAIN:-}"
      GOOGLE_OAUTH_ALLOWED_ORIGINS: "${GOOGLE_OAUTH_ALLOWED_ORIGINS:-}"
    ports:
      - "8081:8080"
    depends_on:
      - auth
      - order
      - inventory
      - notification
      - payments
      - fraud
      - shipping
      - recommendation

  healer:
    restart: unless-stopped
    mem_limit: 1g
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        SERVICE_DIR: agents/healer
        ENTRYPOINT_MODULE: main
    environment:
      SERVICE_NAME: healer
      PORT: "8090"
      ETCD_HOST: etcd
      NATS_URL: nats://nats:4222
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_CHAT_MODEL: "${OPENAI_CHAT_MODEL:-}"
      LOGFIRE_TOKEN: "${LOGFIRE_TOKEN:-}"
    ports:
      - "8090:8090"
    depends_on:
      - auth
      - order
      - inventory
      - notification

  frontend:
    restart: unless-stopped
    mem_limit: 128m
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_GATEWAY_URL: ${VITE_GATEWAY_URL:-http://localhost:8080}
        VITE_HEALER_URL:  ${VITE_HEALER_URL:-http://localhost:8090}
        VITE_JAEGER_URL:  ${VITE_JAEGER_URL:-http://localhost:16686}
        VITE_PROM_URL:    ${VITE_PROM_URL:-http://localhost:9090}
        VITE_FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
    ports:
      - "8080:8080"
    depends_on:
      - gateway
      - healer
