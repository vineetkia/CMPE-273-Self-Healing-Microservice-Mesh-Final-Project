    depends_on:
      etcd:
        condition: service_healthy
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_started

  recommendation:
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        SERVICE_DIR: services/recommendation
        ENTRYPOINT_MODULE: main
    environment:
      SERVICE_NAME: recommendation
      PORT: "50058"
      METRICS_PORT: "9108"
      ETCD_HOST: etcd
      NATS_URL: nats://nats:4222
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      etcd:
        condition: service_healthy
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_started

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        SERVICE_DIR: services/gateway
        ENTRYPOINT_MODULE: main
    environment:
      SERVICE_NAME: gateway
      PORT: "8080"
      ETCD_HOST: etcd
      NATS_URL: nats://nats:4222
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8080:8080"
    depends_on:
      - auth
      - order
      - inventory
      - notification
      - payments
      - fraud
      - shipping
      - recommendation

  healer:
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        SERVICE_DIR: agents/healer
        ENTRYPOINT_MODULE: main
    environment:
      SERVICE_NAME: healer
      PORT: "8090"
      ETCD_HOST: etcd
      NATS_URL: nats://nats:4222
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_CHAT_MODEL: "${OPENAI_CHAT_MODEL:-}"
      LOGFIRE_TOKEN: "${LOGFIRE_TOKEN:-}"
    ports:
      - "8090:8090"
    depends_on:
      - auth
      - order
      - inventory
      - notification

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_GATEWAY_URL: http://localhost:8080
      VITE_HEALER_URL: http://localhost:8090
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.js:/app/vite.config.js:ro
    depends_on:
      - gateway
      - healer
